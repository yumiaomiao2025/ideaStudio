<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>网文studio · 新书向导</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #faf8f3;
    --paper-2: #f3efe4;
    --surface: #ffffff;
    --surface-2: #fbf9f3;
    --ink: #1a1816;
    --ink-2: #4a463f;
    --ink-3: #8a857a;
    --ink-4: #bdb6a6;
    --line: #e8e2d2;
    --line-2: #d9d2bd;
    --accent: #c44a2c;
    --accent-soft: #fdf0e8;
    --accent-line: #e8b8a3;
    --warm: #c9a227;
    --warm-soft: #fbf4d4;
    --green: #5a7d3a;
    --shadow-sm: 0 1px 2px rgba(50, 38, 22, 0.06);
    --shadow-md: 0 4px 12px rgba(50, 38, 22, 0.08), 0 1px 3px rgba(50, 38, 22, 0.06);
    --shadow-lg: 0 18px 48px rgba(50, 38, 22, 0.18), 0 4px 16px rgba(50, 38, 22, 0.10);
    --kbd-bg: #ece6d4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper); color: var(--ink);
    font-family: "Noto Sans SC", system-ui, sans-serif;
    font-size: 14px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .serif { font-family: "Noto Serif SC", serif; }
  .mono { font-family: "JetBrains Mono", monospace; }
  .muted { color: var(--ink-3); }
  button { font-family: inherit; cursor: pointer; }
  kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; padding: 1px 5px;
    background: var(--kbd-bg); color: var(--ink-2);
    border-radius: 3px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; border: 1px solid var(--line-2);
    border-bottom-width: 1.5px;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* ============= APP ============= */
  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* topbar */
  .topbar {
    height: 56px; flex: 0 0 56px;
    background: var(--surface); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 24px; gap: 16px;
  }
  .topbar .brand {
    font-family: "Noto Serif SC", serif; font-weight: 600; font-size: 16px;
  }
  .topbar .brand-dot {
    display: inline-block; width: 9px; height: 9px; background: var(--accent);
    border-radius: 50%; margin-right: 8px; vertical-align: -1px;
  }
  .topbar .crumb { color: var(--ink-3); font-size: 13px; }
  .topbar .crumb b { color: var(--ink); font-weight: 500; }
  .topbar .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .ghost-btn {
    background: transparent; border: 1px solid var(--line-2); color: var(--ink-2);
    padding: 6px 12px; border-radius: 6px; font-size: 13px;
  }
  .ghost-btn:hover { background: var(--paper-2); }

  /* ============= STEPPER ============= */
  .stepper {
    flex: 0 0 76px; background: var(--surface-2);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center;
    padding: 0 40px;
  }
  .stepper-inner { display: flex; align-items: center; width: 100%; max-width: 1100px; margin: 0 auto; }
  .step {
    display: flex; align-items: center; gap: 10px;
    flex: 0 0 auto; cursor: pointer;
    padding: 8px 10px; border-radius: 8px;
    color: var(--ink-3);
  }
  .step:hover { background: rgba(0,0,0,0.03); }
  .step.done { color: var(--ink); }
  .step.current { color: var(--accent); }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-family: "Noto Serif SC", serif; font-weight: 600; font-size: 13px;
    background: transparent;
  }
  .step.done .step-num { background: var(--ink); border-color: var(--ink); color: #fff; }
  .step.current .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
  .step-label { font-size: 13px; font-weight: 500; white-space: nowrap; }
  .step-bar {
    flex: 1 1 auto;
    height: 0; border-top: 1.5px solid var(--line-2);
    margin: 0 6px;
  }
  .step-bar.done { border-top-color: var(--ink); border-top-style: solid; }

  /* ============= MAIN BODY ============= */
  .body {
    flex: 1; display: flex; min-height: 0; overflow: hidden;
  }

  /* center panel */
  .center {
    flex: 1; min-width: 0;
    overflow: auto;
    padding: 36px 40px 120px;
    display: flex; flex-direction: column;
    align-items: center;
  }
  .panel {
    width: 100%; max-width: 800px;
  }
  .panel h1 {
    font-family: "Noto Serif SC", serif;
    font-weight: 600; font-size: 32px;
    margin: 0 0 6px;
  }
  .panel .lede {
    color: var(--ink-3); font-size: 15px; margin-bottom: 24px;
  }
  .panel h2 {
    font-family: "Noto Serif SC", serif;
    font-weight: 500; font-size: 17px;
    margin: 24px 0 10px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .panel h2 .req { color: var(--accent); font-size: 12px; }
  .panel h2 .opt { color: var(--ink-3); font-size: 12px; font-weight: 400; }

  /* chips */
  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px;
    border: 1px solid var(--line-2);
    border-radius: 99px;
    background: var(--surface); color: var(--ink-2);
    font-size: 13.5px;
    transition: all 120ms;
    user-select: none;
  }
  .chip:hover { background: var(--surface-2); border-color: var(--ink-4); }
  .chip.selected {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .chip.warm-selected {
    background: var(--warm-soft); color: #6e5a18; border-color: var(--warm);
  }

  /* slider */
  .slider-row {
    display: flex; align-items: center; gap: 14px; margin-top: 8px;
  }
  .slider-row .label {
    font-size: 13px; color: var(--ink-3);
    flex: 0 0 60px;
  }
  .slider-row .label.right { text-align: right; }
  .slider-row input[type=range] {
    flex: 1; appearance: none; height: 4px;
    background: var(--line-2); border-radius: 99px;
    outline: none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: var(--shadow-sm);
  }
  .slider-summary {
    font-family: "Noto Serif SC", serif; font-size: 15px;
    color: var(--accent); margin-top: 4px;
  }

  /* textareas / inputs */
  textarea, input[type=text] {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--line-2);
    border-radius: 8px; background: var(--surface);
    font-family: "Noto Serif SC", serif;
    font-size: 15px; color: var(--ink);
    line-height: 1.7; resize: vertical;
    transition: border 120ms, box-shadow 120ms;
  }
  textarea:focus, input[type=text]:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  textarea { min-height: 80px; }
  .input-hint {
    font-size: 11.5px; color: var(--ink-3); margin-top: 4px;
    display: flex; gap: 12px;
  }

  /* outline cards */
  .vol-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;
    margin-top: 16px;
  }
  .vol-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    box-shadow: var(--shadow-sm);
  }
  .vol-card.middle {
    border-color: var(--accent-line); background: var(--accent-soft);
  }
  .vol-card h3 {
    margin: 0; font-family: "Noto Serif SC", serif;
    font-size: 15px; font-weight: 600;
    display: flex; align-items: baseline; gap: 6px;
  }
  .vol-card .sub { color: var(--ink-3); font-size: 11.5px; margin-bottom: 8px; }
  .beat {
    display: flex; gap: 6px; margin: 6px 0;
    align-items: flex-start;
  }
  .beat-num {
    flex: 0 0 18px; height: 18px;
    background: var(--ink); color: #fff;
    border-radius: 4px; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", monospace;
    margin-top: 2px;
  }
  .vol-card.middle .beat-num { background: var(--accent); }
  .beat-text {
    font-family: "Noto Serif SC", serif;
    font-size: 13px; color: var(--ink-2); line-height: 1.65;
  }
  .beat-text .fl { color: var(--warm); font-size: 11px; }

  /* world / entity grid */
  .entity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .entity-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .entity-card h4 {
    margin: 0 0 4px; font-family: "Noto Serif SC", serif;
    font-size: 14px; font-weight: 600;
    display: flex; align-items: baseline; gap: 6px;
  }
  .entity-card .kind {
    font-size: 11px; color: var(--ink-3); font-weight: 400;
  }
  .entity-card p {
    margin: 0; font-family: "Noto Serif SC", serif;
    font-size: 13px; color: var(--ink-2); line-height: 1.65;
  }
  .entity-card.fl { border-color: var(--warm); background: var(--warm-soft); }
  .entity-card .actions {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .entity-card .actions button {
    background: transparent; border: 1px solid var(--line-2);
    padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--ink-3);
  }
  .entity-card .actions button:hover { background: var(--paper-2); color: var(--ink); }

  /* opening candidates */
  .candidate {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 14px;
    transition: all 160ms;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
  }
  .candidate:hover {
    border-color: var(--ink-4);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .candidate.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    box-shadow: 0 0 0 3px rgba(196, 74, 44, 0.12);
  }
  .candidate-head {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px;
  }
  .candidate-num {
    font-family: "Noto Serif SC", serif;
    font-weight: 600; font-size: 16px;
  }
  .candidate.selected .candidate-num { color: var(--accent); }
  .candidate-style {
    font-size: 12px; color: var(--ink-3);
    padding: 2px 8px; background: var(--paper-2); border-radius: 99px;
  }
  .candidate-check {
    margin-left: auto; color: var(--accent);
    font-family: "Noto Serif SC", serif; font-size: 13px;
  }
  .candidate-text {
    font-family: "Noto Serif SC", serif;
    font-size: 15.5px; line-height: 1.95;
    color: var(--ink); text-indent: 2em;
  }
  .candidate-actions {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .candidate-actions button {
    background: var(--surface-2);
    border: 1px solid var(--line-2);
    padding: 4px 12px; border-radius: 5px;
    font-size: 12px; color: var(--ink-2);
  }
  .candidate-actions button:hover { background: var(--paper-2); color: var(--ink); }

  /* AI loading skeleton */
  .ai-loading {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 22px;
    text-align: center; color: var(--accent);
    font-family: "Noto Serif SC", serif; font-size: 15px;
    margin: 14px 0;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .ai-loading .dots {
    display: inline-flex; gap: 4px;
  }
  .ai-loading .dot {
    width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; display: inline-block;
    animation: pulse-dot 1.1s infinite ease-in-out;
  }
  .ai-loading .dot:nth-child(2) { animation-delay: 0.15s; }
  .ai-loading .dot:nth-child(3) { animation-delay: 0.30s; }
  @keyframes pulse-dot {
    0%, 60%, 100% { transform: scale(0.85); opacity: 0.5; }
    30% { transform: scale(1); opacity: 1; }
  }

  /* recap sidebar */
  .recap {
    flex: 0 0 280px; background: var(--surface-2);
    border-left: 1px solid var(--line);
    overflow: auto; padding: 20px 18px;
  }
  .recap h3 {
    margin: 0 0 4px; font-family: "Noto Serif SC", serif;
    font-size: 14px; font-weight: 600;
  }
  .recap .sub {
    color: var(--ink-3); font-size: 11.5px; margin-bottom: 14px;
  }
  .recap-section {
    margin-bottom: 14px; padding-bottom: 14px;
    border-bottom: 1px dashed var(--line);
  }
  .recap-section:last-child { border-bottom: 0; }
  .recap-section h4 {
    margin: 0 0 5px; font-size: 11.5px; color: var(--ink-3);
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .recap-section .val {
    font-family: "Noto Serif SC", serif;
    font-size: 13px; color: var(--ink); line-height: 1.65;
  }
  .recap-section .pending {
    color: var(--ink-4); font-style: italic; font-size: 12px;
  }
  .recap-tag {
    display: inline-block; padding: 1px 8px;
    background: var(--surface); border: 1px solid var(--line-2);
    border-radius: 99px; font-size: 11.5px; color: var(--ink-2);
    margin: 2px 3px 2px 0;
  }
  .recap-tag.fl { background: var(--warm-soft); border-color: var(--warm); color: #6e5a18; }
  .recap-tag.accent { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* nav footer */
  .nav-foot {
    position: fixed; bottom: 0; left: 0; right: 280px;
    background: var(--surface); border-top: 1px solid var(--line);
    padding: 14px 40px;
    display: flex; align-items: center; gap: 12px;
    z-index: 30;
  }
  .nav-foot .hint {
    flex: 1; color: var(--ink-3); font-size: 12.5px;
    text-align: center;
  }
  .btn {
    padding: 10px 20px; border-radius: 7px;
    font-size: 14px; font-weight: 500;
    border: 1px solid var(--line-2);
    background: var(--surface); color: var(--ink-2);
  }
  .btn:hover { background: var(--surface-2); }
  .btn.primary {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }
  .btn.primary:hover { background: #b04025; }
  .btn:disabled, .btn.primary:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .btn.primary:disabled:hover { background: var(--accent); }

  /* hero step: final */
  .hero-end {
    text-align: center; padding: 28px 0 16px;
  }
  .hero-end .stat {
    display: inline-block; margin: 0 14px;
    text-align: left;
  }
  .hero-end .stat .num {
    font-family: "Noto Serif SC", serif;
    font-size: 28px; font-weight: 600; color: var(--accent);
    line-height: 1;
  }
  .hero-end .stat .lbl {
    font-size: 11px; color: var(--ink-3); margin-top: 2px;
  }

  /* AI inline button */
  .ai-helper {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-soft); color: var(--accent);
    border: 1px solid var(--accent-line); padding: 4px 10px;
    border-radius: 99px; font-size: 12px; font-weight: 500;
  }
  .ai-helper:hover { background: var(--accent); color: #fff; }

  .pill-row { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
  .pill {
    padding: 4px 10px; border-radius: 99px;
    border: 1px solid var(--line-2); background: var(--surface);
    font-size: 12px; color: var(--ink-2);
  }
  .pill.warm { background: var(--warm-soft); border-color: var(--warm); color: #6e5a18; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel" src="onboard-app.jsx"></script>
</body>
</html>
